name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}

          script: |
            cd /var/www/html/msme/project-msme-

            git fetch origin
            git reset --hard origin/main

            npm install

            # Backend
            cd backend
            npm install
            cd ..

            # MSME Portal
            cd msme-portal
            npm install
            npm run build
            cd ..

            # Admin
            cd ADMIN
            npm install
            npm run build
            cd ..

            # Participant Portal
            cd participante-portal
            npm install
            npm run build
            cd ..

            pm2 restart msme-api
            pm2 restart participant-portal

            pm2 save